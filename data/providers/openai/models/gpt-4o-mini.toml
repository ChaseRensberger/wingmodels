id = "openai/gpt-4o-mini"
display_name = "GPT-4o mini via OpenAI"
interface_profiles = ["openai.responses.v1", "openai.chatcompletions.v1"]
supported_parameters = ["sampling.temperature", "sampling.top_p", "limits.max_output_tokens"]

[[capabilities]]
id = "text-input"

[[capabilities]]
id = "text-output"

[[capabilities]]
id = "image-input"

[[capabilities]]
id = "tool-calling"
version = "v1"

[capabilities.details]
style = "openai"

[[capabilities]]
id = "structured-output"

[limits]
context_window = 128000
max_output_tokens = 16384

[pricing]
input_per_million = 0.15
output_per_million = 0.60
cache_read_per_million = 0.08

[modalities]
input = ["text", "image"]
output = ["text"]

